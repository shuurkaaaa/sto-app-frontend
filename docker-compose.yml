services:
  postgres:
    image: postgres:16-alpine
    container_name: sto-postgres
    environment:
      POSTGRES_USER: sto
      POSTGRES_PASSWORD: sto
      POSTGRES_DB: sto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sto -d sto"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./sto-backend
    container_name: sto-backend
    ports:
      - "5000:5000"
    env_file:
      - ./sto-backend/.env
    environment:
      DATABASE_URL: "postgresql://sto:sto@postgres:5432/sto?schema=public"
      JWT_SECRET: "super_secret_key_for_sto_project_2026"
      PORT: "5000"
      FROM_EMAIL: "${FROM_EMAIL:-onboarding@resend.dev}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
    container_name: sto-frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
