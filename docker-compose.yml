services:
  backend:
    build:
      context: ./sto-backend
    container_name: sto-backend
    ports:
      - "5000:5000"
    env_file:
      - ./sto-backend/.env
    environment:
      DATABASE_URL: "file:/app/data/dev.db"
      JWT_SECRET: "super_secret_key_for_sto_project_2026"
      PORT: "5000"
      FROM_EMAIL: "${FROM_EMAIL:-onboarding@resend.dev}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
    volumes:
      - backend_db:/app/data
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
    container_name: sto-frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_db:
  backend_uploads:
