<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480"
     font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="a" markerWidth="4.5" markerHeight="4.5" refX="4" refY="2.25" orient="auto" overflow="visible">
      <path d="M0,0 L0,4.5 L3.8,2.25 z" fill="#222"/>
    </marker>
    <marker id="al" markerWidth="4.5" markerHeight="4.5" refX="0.85" refY="2.25" orient="auto" overflow="visible">
      <path d="M3.8,0 L3.8,4.5 L0,2.25 z" fill="#222"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="600" y="28" fill="#111" font-size="15" font-weight="bold" text-anchor="middle">
    Full-stack CRM architecture — STO web application</text>

  <text x="179" y="78" font-size="11.5" font-weight="bold" text-anchor="middle">Client tier</text>

  <rect x="28" y="88" width="312" height="30" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="184" y="108" font-size="10.5" font-weight="bold" text-anchor="middle">User / browser</text>

  <rect x="28" y="124" width="312" height="30" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="184" y="144" font-size="10.5" font-weight="bold" text-anchor="middle">React SPA</text>

  <rect x="28" y="160" width="312" height="28" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="184" y="178" font-size="10.3" font-weight="bold" text-anchor="middle">React Router</text>

  <rect x="28" y="194" width="312" height="28" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="184" y="212" font-size="10.2" font-weight="bold" text-anchor="middle">Route guard</text>

  <rect x="28" y="228" width="312" height="36" rx="6" fill="#fafafa" stroke="#1a1a1a" stroke-width="0.9" stroke-dasharray="5,4"/>
  <text x="184" y="250" font-size="10.5" font-weight="bold" text-anchor="middle">CombinedProvider</text>

  <rect x="28" y="270" width="312" height="28" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="184" y="288" font-size="10.3" font-weight="bold" text-anchor="middle">Pages</text>

  <rect x="28" y="304" width="312" height="28" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="184" y="322" font-size="10.3" font-weight="bold" text-anchor="middle">Components &amp; hooks</text>

  <rect x="28" y="338" width="312" height="32" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="184" y="358" font-size="10.8" font-weight="bold" text-anchor="middle">Axios apiClient</text>

  <rect x="28" y="378" width="112" height="26" rx="5" fill="#f2f2f2" stroke="#333" stroke-width="0.85"/>
  <text x="84" y="395" font-size="9.8" font-weight="bold" text-anchor="middle">localStorage</text>

  <!-- Client spine: segment ends meet box edges (y at borders) -->
  <line x1="184" y1="118" x2="184" y2="124" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <line x1="184" y1="154" x2="184" y2="160" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <line x1="184" y1="188" x2="184" y2="194" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <line x1="184" y1="222" x2="184" y2="228" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <line x1="184" y1="264" x2="184" y2="270" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <line x1="184" y1="298" x2="184" y2="304" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <line x1="184" y1="332" x2="184" y2="338" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <path d="M 140 404 L 14 404 L 14 354 L 28 354" fill="none" stroke="#444" stroke-width="0.75" marker-end="url(#a)"/>

  <!-- Bridge: HTTP band -->
  <rect x="348" y="58" width="64" height="398" fill="#ededed" stroke="#999" stroke-width="0.85"/>
  <text x="380" y="258" font-size="10" font-weight="bold" text-anchor="middle">HTTP</text>

  <!-- Server -->
  <text x="802" y="78" font-size="11.5" font-weight="bold" text-anchor="middle">Server tier</text>

  <rect x="432" y="88" width="740" height="32" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="802" y="108" font-size="10.5" font-weight="bold" text-anchor="middle">Express middleware</text>

  <rect x="432" y="126" width="740" height="32" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="802" y="146" font-size="10.5" font-weight="bold" text-anchor="middle">Routes</text>

  <rect x="432" y="164" width="740" height="36" rx="6" fill="#fafafa" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="802" y="186" font-size="10.5" font-weight="bold" text-anchor="middle">Controllers</text>

  <rect x="432" y="206" width="740" height="38" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="802" y="230" font-size="10.5" font-weight="bold" text-anchor="middle">Services</text>

  <rect x="432" y="270" width="236" height="34" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="550" y="287" font-size="10" font-weight="bold" text-anchor="middle">Axios (outbound)</text>
  <rect x="676" y="270" width="236" height="34" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="794" y="287" font-size="10" font-weight="bold" text-anchor="middle">Prisma ORM</text>
  <rect x="920" y="270" width="252" height="34" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="0.9"/>
  <text x="1046" y="287" font-size="10" font-weight="bold" text-anchor="middle">Multer / files</text>

  <rect x="432" y="326" width="472" height="56" rx="7" fill="#f5f5f5" stroke="#444" stroke-width="0.85"/>
  <text x="668" y="354" font-size="10.5" font-weight="bold" text-anchor="middle">External APIs</text>

  <!-- PostgreSQL: label inside cylinder (ellipse); Prisma connects to ellipse top -->
  <ellipse cx="1044" cy="422" rx="92" ry="22" fill="#e4e4e4" stroke="#222" stroke-width="0.85"/>
  <text x="1044" y="422" font-size="11" font-weight="bold" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>

  <line x1="802" y1="120" x2="802" y2="126" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <line x1="802" y1="158" x2="802" y2="164" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>
  <line x1="802" y1="200" x2="802" y2="206" stroke="#333" stroke-width="0.75" marker-end="url(#a)"/>

  <!-- Services → three cols: one straight vertical per column (no 802↔794 jog) -->
  <path d="M 550 244 L 550 270" fill="none" stroke="#444" stroke-width="0.75" marker-end="url(#a)"/>
  <path d="M 794 244 L 794 270" fill="none" stroke="#444" stroke-width="0.75" marker-end="url(#a)"/>
  <path d="M 1046 244 L 1046 270" fill="none" stroke="#444" stroke-width="0.75" marker-end="url(#a)"/>

  <line x1="550" y1="304" x2="550" y2="326" stroke="#444" stroke-width="0.75" marker-end="url(#a)"/>
  <path d="M 794 304 L 794 314 L 1044 314 L 1044 400" fill="none" stroke="#444" stroke-width="0.75" marker-end="url(#a)"/>

  <!-- Controllers → Multer: right gutter, arrow meets block edges -->
  <path d="M 1172 182 L 1194 182 L 1194 270 L 1172 270" fill="none" stroke="#444" stroke-width="0.75" marker-end="url(#al)"/>

  <!-- HTTP: request/response — last horizontal as its own line so marker-end always renders -->
  <path d="M 340 354 L 348 354 L 348 104" fill="none" stroke="#222" stroke-width="0.8"/>
  <line x1="348" y1="104" x2="429" y2="104" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <line x1="432" y1="182" x2="348" y2="182" stroke="#222" stroke-width="0.8" marker-end="url(#al)"/>
  <path d="M 348 182 L 348 354" fill="none" stroke="#222" stroke-width="0.8"/>
  <line x1="348" y1="354" x2="341" y2="354" stroke="#222" stroke-width="0.8" marker-end="url(#al)"/>
</svg>
