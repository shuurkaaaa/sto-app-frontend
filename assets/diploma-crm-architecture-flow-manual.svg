<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="2057" viewBox="0 -200 1120 2057">
  <defs>
    <marker id="mkEnd" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L12,6 L0,12 z" fill="#000"/></marker>
    <marker id="mkStart" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M12,0 L12,12 L0,6 z" fill="#000"/></marker>
  </defs>
  <rect x="0" y="-200" width="1120" height="2057" fill="#ffffff"/>

  <g id="diagram" transform="translate(0, -236)">
  <g transform="translate(560, 865.5) scale(0.88) translate(-560,-864)">

  <text x="560" y="36" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">CRM backend layered architecture</text>

  <!-- Center spine x -->
  <!-- Client -->
  <rect x="420" y="56" rx="10" ry="10" width="280" height="72" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="560" y="100" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Client</text>
  <text x="560" y="118" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">React SPA</text>

  <!-- Presentation -->
  <rect x="188" y="158" rx="12" ry="12" width="744" height="474" fill="none" stroke="#000" stroke-width="2"/>
  <text x="560" y="186" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Presentation layer</text>
  <rect x="286" y="204" rx="8" ry="8" width="548" height="92" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="560" y="246" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Express middleware</text>
  <text x="560" y="262" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10.8" text-anchor="middle">CORS, body-parser, logging</text>
  <rect x="286" y="318" rx="8" ry="8" width="548" height="92" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="560" y="360" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Routes</text>
  <text x="560" y="378" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10.5" text-anchor="middle">/api/auth, /api/orders, /api/vin, ...</text>
  <rect x="286" y="432" rx="8" ry="8" width="548" height="92" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="560" y="466" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Controllers</text>
  <text x="560" y="484" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="11.2" text-anchor="middle">REST endpoints</text>

  <!-- Service -->
  <rect x="168" y="658" rx="12" ry="12" width="784" height="328" fill="none" stroke="#000" stroke-width="2"/>
  <text x="560" y="686" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Service layer - business logic and integrations</text>
  <rect x="214" y="708" rx="8" ry="8" width="692" height="108" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="560" y="744" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Services</text>
  <text x="560" y="766" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10.3" text-anchor="middle">autoRiaService, vinServiceNew, emailService, cacheService</text>
  <rect x="386" y="856" rx="8" ry="8" width="348" height="84" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="560" y="892" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Auth / tokens</text>
  <text x="560" y="910" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">bcrypt, JWT</text>

  <!-- Persistence (offset below Service outer frame: 20px gap) -->
  <rect x="72" y="1006" rx="12" ry="12" width="976" height="700" fill="none" stroke="#000" stroke-width="2"/>
  <text x="560" y="1037" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Persistence and integration layer</text>

  <rect x="120" y="1066" rx="8" ry="8" width="268" height="88" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="254" y="1104" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">HTTP client Axios</text>
  <text x="254" y="1122" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">external HTTPS calls</text>

  <rect x="426" y="1066" rx="8" ry="8" width="268" height="88" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="560" y="1110" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle">ORM: Prisma Client</text>

  <rect x="732" y="1066" rx="8" ry="8" width="268" height="88" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="866" y="1106" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">File system</text>
  <text x="866" y="1124" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">uploads / static</text>

  <!-- External APIs -->
  <rect x="100" y="1200" rx="10" ry="10" width="524" height="348" fill="none" stroke="#000" stroke-width="1.6"/>
  <text x="362" y="1226" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">External web APIs</text>
  <rect x="138" y="1248" rx="6" ry="6" width="216" height="76" fill="#fff" stroke="#000"/>
  <text x="246" y="1290" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">AUTO.RIA API</text>
  <text x="246" y="1306" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="9.2" text-anchor="middle">developers.ria.com</text>
  <rect x="372" y="1248" rx="6" ry="6" width="216" height="76" fill="#fff" stroke="#000"/>
  <text x="480" y="1294" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">NHTSA vPIC</text>
  <rect x="138" y="1354" rx="6" ry="6" width="216" height="72" fill="#fff" stroke="#000"/>
  <text x="246" y="1396" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">CarQuery API</text>
  <rect x="372" y="1354" rx="6" ry="6" width="216" height="72" fill="#fff" stroke="#000"/>
  <text x="480" y="1392" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">Resend API</text>
  <text x="480" y="1410" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="9.2" text-anchor="middle">transactional email</text>

  <ellipse cx="560" cy="1614" rx="104" ry="42" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="560" y="1622" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PostgreSQL</text>

  <!-- Spine (vertical center x=560): only orthogonal segments -->
  <line x1="560" y1="128" x2="560" y2="204" stroke="#000" stroke-width="2" marker-end="url(#mkEnd)" marker-start="url(#mkStart)"/>
  <text x="572" y="172" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="9.5">HTTP / JSON, Bearer JWT</text>

  <line x1="560" y1="296" x2="560" y2="318" stroke="#000" stroke-width="2" marker-end="url(#mkEnd)"/>
  <line x1="560" y1="410" x2="560" y2="432" stroke="#000" stroke-width="2" marker-end="url(#mkEnd)"/>

  <line x1="560" y1="524" x2="560" y2="708" stroke="#000" stroke-width="2" marker-end="url(#mkEnd)"/>
  <line x1="560" y1="816" x2="560" y2="856" stroke="#000" stroke-width="2" marker-end="url(#mkEnd)"/>
  <line x1="560" y1="940" x2="560" y2="1056" stroke="#000" stroke-width="2"/>

  <line x1="560" y1="1056" x2="560" y2="1066" stroke="#000" stroke-width="2" marker-end="url(#mkEnd)"/>
  <line x1="560" y1="1056" x2="254" y2="1056" stroke="#000" stroke-width="2"/>
  <line x1="254" y1="1056" x2="254" y2="1066" stroke="#000" stroke-width="2" marker-end="url(#mkEnd)"/>

  <!-- CTRL right edge square path to FS -->
  <path d="M 834 478 L 866 478 L 866 1066" fill="none" stroke="#000" stroke-width="2" marker-end="url(#mkEnd)"/>

  <!-- PR to PostgreSQL: east x=930, down past External APIs (bottom ~1548), west to spine above ellipse -->
  <path d="M 560 1154 L 560 1164 L 930 1164 L 930 1568 L 560 1568 L 560 1572" fill="none" stroke="#000" stroke-width="2" stroke-linejoin="miter" stroke-linecap="butt" marker-end="url(#mkEnd)"/>

  <!-- Axios to External APIs: hub y=1178 above outer frame (y=1200); bus clears title; row2 via side rails and inter-row gutter -->
  <line x1="254" y1="1154" x2="254" y2="1178" stroke="#000" stroke-width="2"/>
  <line x1="86" y1="1178" x2="638" y2="1178" stroke="#000" stroke-width="2"/>
  <line x1="246" y1="1178" x2="246" y2="1248" stroke="#000" stroke-width="1.5" marker-end="url(#mkEnd)"/>
  <line x1="480" y1="1178" x2="480" y2="1248" stroke="#000" stroke-width="1.5" marker-end="url(#mkEnd)"/>
  <path d="M 86 1178 L 86 1338 L 246 1338 L 246 1354" fill="none" stroke="#000" stroke-width="1.5" stroke-linejoin="miter" stroke-linecap="butt" marker-end="url(#mkEnd)"/>
  <path d="M 638 1178 L 638 1338 L 480 1338 L 480 1354" fill="none" stroke="#000" stroke-width="1.5" stroke-linejoin="miter" stroke-linecap="butt" marker-end="url(#mkEnd)"/>
  </g>
  </g>
