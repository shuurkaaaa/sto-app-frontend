  <text x="640" y="88" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Робоча область: склад</text>

  <!-- Category / filters card -->
  <rect x="252" y="104" width="736" height="108" rx="4" fill="none" stroke="#000" stroke-width="1"/>
