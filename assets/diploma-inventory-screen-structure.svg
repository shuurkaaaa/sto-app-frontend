  <text x="278" y="544" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold">Додати товар на склад</text>

  <text x="520" y="598" fill="#000" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" text-anchor="middle">
