  <line x1="860" y1="318" x2="770" y2="340" stroke="#000" stroke-width="1" marker-end="url(#a2)"/>

  <!-- Add button area -->
  <rect x="252" y="504" width="736" height="72" rx="4" fill="none" stroke="#000" stroke-width="1"/>
