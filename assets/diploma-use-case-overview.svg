    <text x="900" y="238" class="t" text-anchor="middle">Staff</text>
    <text x="764" y="256" class="s">EM-1 specialization categories</text>
    <text x="764" y="270" class="s">EM-2 employee cards</text>
    <text x="764" y="284" class="s">EM-3 edit / archive</text>
    <line x1="94" y1="162" x2="840" y2="238" stroke="#334155" marker-end="url(#mArrow)"/>
  </g>

  <g>
    <rect x="152" y="334" width="896" height="158" rx="6" class="box"/>
    <text x="600" y="356" class="t" text-anchor="middle">Order journal</text>
    <text x="164" y="376" class="s">JD-A create JD-B edit JD-C status JD-D parts usage modal</text>
    <text x="164" y="392" class="s">JD-E COMPLETED stock check write-off JD-F rollback JD-G archive JD-H workload strip</text>
