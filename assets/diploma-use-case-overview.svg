    Use case diagram (STO web app)</text>
  <text x="550" y="44" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">
    Scenario codes CL / IN / PR / EM / JD / AN per thesis tables 4.2-4.7</text>

  <circle cx="72" cy="118" r="20" fill="none" stroke="#0f172a" stroke-width="1.6"/>
  <line x1="72" y1="138" x2="72" y2="182" stroke="#0f172a" stroke-width="1.6"/>
  <line x1="42" y1="162" x2="102" y2="162" stroke="#0f172a" stroke-width="1.6"/>
  <line x1="72" y1="182" x2="50" y2="222" stroke="#0f172a" stroke-width="1.6"/>
  <line x1="72" y1="182" x2="94" y2="222" stroke="#0f172a" stroke-width="1.6"/>
  <text x="72" y="248" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Authorized</text>
  <text x="72" y="262" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">user</text>

  <rect x="128" y="56" width="940" height="808" rx="12" fill="none" stroke="#0f172a" stroke-width="2"/>
  <text x="146" y="82" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold">System boundary: STO CRM SPA + REST API</text>

  <style type="text/css"><![CDATA[
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.2; }
    .t { fill: #0f172a; font-family: Arial, Helvetica, sans-serif; font-size: 10px; font-weight: bold; }
    .s { fill: #334155; font-family: Arial, Helvetica, sans-serif; font-size: 8.5px; }
  ]]></style>

  <g>
    <rect x="152" y="102" width="200" height="68" rx="6" class="box"/>
    <text x="252" y="122" class="t" text-anchor="middle">Auth</text>
    <text x="162" y="140" class="s">login, JWT session</text>
    <text x="162" y="154" class="s">protected routes</text>
    <line x1="94" y1="162" x2="152" y2="132" stroke="#334155" marker-end="url(#mArrow)"/>
  </g>

  <g>
