<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1290" viewBox="0 0 1200 1290">
  <defs>
    <marker id="mEnd" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" overflow="visible">
      <path d="M0,0 L0,10 L10,5 z" fill="#000000"/>
    </marker>
    <marker id="mStart" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto" overflow="visible">
      <path d="M10,0 L10,10 L0,5 z" fill="#000000"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="600" y="32" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">
    Server-side layered architecture (backend CRM, auto workshop)</text>

  <rect x="488" y="46" width="224" height="36" rx="4" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="600" y="70" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">HTTP edge (external)</text>

  <!-- Request: meets Router bottom-centre via gutter -->
  <path d="M 600 82 L 600 248 L 370 248 L 370 222" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <text x="612" y="168" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="10">request</text>
  <!-- Response: from Middleware top up to HTTP right edge -->
  <path d="M 166 134 L 166 114 L 520 114 L 520 82" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <text x="530" y="108" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="10">response</text>

  <text x="600" y="125" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Express HTTP API</text>

  <!-- Narrower boxes, explicit gutters (~28 px) -->
  <rect x="88" y="134" width="156" height="88" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="166" y="186" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Middleware</text>

  <rect x="272" y="134" width="196" height="88" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="370" y="186" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Router</text>

  <rect x="496" y="134" width="188" height="88" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="590" y="186" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">REST controllers</text>

  <!-- Inter-block connectors (elongated in gutters) -->
  <line x1="252" y1="178" x2="264" y2="178" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)"/>
  <line x1="252" y1="188" x2="264" y2="188" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)"/>
  <line x1="476" y1="178" x2="488" y2="178" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)"/>

  <path d="M 166 222 L 166 394" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <path d="M 370 222 L 370 394" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>

  <!-- Controllers -> DTO (right corridor) -->
  <path d="M 590 222 L 590 298 L 712 298" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <circle cx="734" cy="298" r="20" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="734" y="302" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">DTO</text>

  <path d="M 734 318 L 734 334 L 1088 334 L 1088 394 L 748 394" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>

  <text x="600" y="380" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Facade layer</text>

  <!-- Facades / Converters gap 44 px for reciprocal -->
  <rect x="88" y="394" width="442" height="52" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="309" y="428" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Facades</text>
  <rect x="574" y="394" width="346" height="52" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="747" y="428" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Converters</text>
  <!-- Reciprocal: wide segment in gutter -->
  <line x1="530" y1="420" x2="564" y2="420" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>
  <!-- High reciprocal band (between section title and facade boxes) -->
  <path d="M 1092 370 L 80 370" stroke="#000000" stroke-width="1.15" fill="none" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>

  <path d="M 309 446 L 309 492 L 438 492 L 438 510" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <!-- Converters to Domain: right corridor, then inward on tangent -->
  <path d="M 747 446 L 747 502 L 420 502 L 420 510 L 438 510" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>

  <circle cx="438" cy="534" r="24" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="438" y="539" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Domain</text>
  <path d="M 438 558 L 438 598 L 376 598" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>

  <text x="600" y="602" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Service layer</text>

  <rect x="88" y="612" width="576" height="58" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="376" y="646" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Business services</text>
  <rect x="688" y="612" width="232" height="58" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="804" y="646" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Scheduler</text>
  <line x1="672" y1="640" x2="684" y2="640" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>

  <circle cx="540" cy="732" r="24" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="540" y="736" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Model</text>
  <path d="M 376 670 L 376 732 L 516 732" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <path d="M 804 670 L 804 732 L 564 732" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>

  <!-- Domain -> Model gutter left -->
  <path d="M 438 558 L 70 558 L 70 748 L 516 748 L 516 732" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>

  <!-- Spine to persistence pillar centres -->
  <path d="M 540 756 L 540 808 L 186 808 L 186 854" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <path d="M 540 808 L 418 808 L 418 854" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <path d="M 540 808 L 650 808 L 650 854" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <path d="M 540 808 L 892 808 L 892 864" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>

  <text x="600" y="836" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Persistence</text>

  <!-- Narrower pillars, wider gutters (~36) -->
  <rect x="88" y="854" width="196" height="58" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="186" y="888" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Remote HTTP APIs</text>

  <rect x="320" y="854" width="196" height="58" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="418" y="889" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Repositories</text>

  <rect x="552" y="854" width="196" height="58" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="650" y="889" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">File gateway</text>

  <rect x="784" y="854" width="196" height="58" rx="4" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="882" y="888" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Secrets</text>

  <!-- Wider reciprocal links between pillars -->
  <line x1="294" y1="882" x2="318" y2="882" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>
  <line x1="526" y1="882" x2="548" y2="882" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>
  <line x1="758" y1="882" x2="782" y2="882" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>

  <!-- Cross-cutting = compact caption (no oversized bar) -->
  <text x="600" y="946" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Cross-cutting adapters (Axios, Prisma runtime, logging, static uploads)</text>

  <!-- Down to storages, arrowheads meet ellipse tops -->
  <path d="M 186 912 L 186 1076" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <path d="M 418 912 L 418 1068" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <path d="M 650 912 L 650 1076" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>
  <path d="M 882 912 L 882 1076" stroke="#000000" stroke-width="1.4" fill="none" marker-end="url(#mEnd)"/>

  <!-- From adapters caption to SaaS pillar -->
  <path d="M 600 950 L 600 1032 L 186 1032 L 186 1076" stroke="#000000" stroke-width="1.2" fill="none" marker-end="url(#mEnd)"/>

  <!-- Wider ellipse connectors -->
  <line x1="314" y1="1066" x2="338" y2="1066" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>
  <line x1="546" y1="1066" x2="570" y2="1066" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>
  <line x1="778" y1="1066" x2="802" y2="1066" stroke="#000000" stroke-width="1.4" marker-end="url(#mEnd)" marker-start="url(#mStart)"/>

  <!-- Ellipses raised & slightly smaller for gap; centred on persistence columns -->
  <ellipse cx="186" cy="1110" rx="72" ry="34" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="186" y="1114" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">SaaS providers</text>

  <ellipse cx="418" cy="1110" rx="126" ry="42" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="418" y="1113" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">PostgreSQL relational DB</text>

  <ellipse cx="650" cy="1110" rx="72" ry="34" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="650" y="1114" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Filesystem</text>

  <ellipse cx="882" cy="1110" rx="72" ry="34" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="882" y="1114" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Dotenv secrets</text>
</svg>
